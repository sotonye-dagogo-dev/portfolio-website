<div class="page page-sm">
  <header class="page-header">
    <p class="page-header__label reveal">Experience</p>
    <h1 class="page-header__title reveal-left">Career Timeline</h1>
    <p class="page-header__subtitle reveal" style="transition-delay:.1s" appTypingEffect>Engineering, leadership, and building at scale</p>
  </header>

  <section class="timeline">
    <div *ngFor="let entry of content.experiences; let i = index"
         class="timeline__entry reveal-left"
         [class.timeline__entry--current]="entry.isCurrent"
         [style.transition-delay]="i * 0.05 + 's'">
      <div class="timeline__dot"></div>
      <div class="timeline__card">
        <div class="current-badge" *ngIf="entry.isCurrent">
          <span class="dot" appPulsatingEffect></span>
          Current
        </div>
        <div class="timeline__header">
          <div>
            <h2 class="timeline__role">{{ entry.role }}</h2>
            <p class="timeline__org">{{ entry.organization }}</p>
          </div>
          <span class="timeline__date">{{ entry.dateRange }}</span>
        </div>
        <div class="timeline__desc">
          <p class="reveal-blur" *ngFor="let desc of entry.description">{{ desc }}</p>
        </div>
        <div class="timeline__tags">
          <span class="pill" *ngFor="let tag of entry.tags">{{ tag }}</span>
        </div>
      </div>
    </div>
  </section>
</div>
