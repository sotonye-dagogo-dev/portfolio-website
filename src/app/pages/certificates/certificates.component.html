<div class="page">
  <header class="page-header">
    <p class="page-header__label reveal">Certificates</p>
    <h1 class="page-header__title reveal-left">Professional Certifications</h1>
    <p class="page-header__subtitle reveal" style="transition-delay:.1s" appTypingEffect>Take a look at some of my professional certifications and achievements.</p>
  </header>

  <section class="certificates">
    <div class="cert-category" *ngFor="let category of content.certificates; let ci = index">
      <div class="cert-header">
        <div class="cert-header__left">
          <h2 class="cert-category__title">{{ category.title }}</h2>
          <span class="cert-category__count">{{ category.items.length }}</span>
        </div>
        <div class="gallery-nav">
          <button class="gallery-nav-btn" (click)="scrollGallery(ci, -340)">&larr;</button>
          <button class="gallery-nav-btn" (click)="scrollGallery(ci, 340)">&rarr;</button>
        </div>
      </div>

      <div class="cert-gallery" [id]="'cert-gallery-' + ci">
        <div class="cert-card" *ngFor="let cert of category.items">
          <div class="cert-card__image" appImageViewer [fullImage]="cert.image">
            <img [src]="cert.image" [alt]="cert.title" />
          </div>
          <div class="cert-card__body">
            <h3 class="cert-card__title">{{ cert.title }}</h3>
            <p class="cert-card__desc">{{ cert.description }}</p>
            <div class="cert-card__tech" *ngIf="cert.techStack?.length">
              <span class="pill" *ngFor="let tech of cert.techStack">{{ tech }}</span>
            </div>
            <div class="cert-card__actions">
              <a [href]="cert.link" target="_blank" rel="noopener" class="cert-btn cert-btn-primary" appAnimatedBorder>
                View Certificate &rarr;
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
