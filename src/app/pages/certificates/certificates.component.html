<div class="page">
  <header class="page-header">
    <p class="page-header__label">Certificates</p>
    <h1 class="page-header__title">Professional Certifications</h1>
    <p class="page-header__subtitle" appTypingEffect>Take a look at some of my professional certifications and achievements.</p>
  </header>

  <section class="certificates">
    <div class="cert-category" *ngFor="let category of content.certificates">
      <div class="cert-category__header">
        <div class="cert-category__title-group">
          <h2 class="cert-category__title">{{ category.title }}</h2>
          <span class="cert-category__count">{{ category.items.length }}</span>
        </div>
      </div>

      <div class="cert-grid">
        <div class="cert-card" *ngFor="let cert of category.items">
          <div class="cert-card__image" appImageViewer [fullImage]="cert.image">
            <img [src]="cert.image" [alt]="cert.title" />
          </div>
          <div class="cert-card__body">
            <h3 class="cert-card__title">{{ cert.title }}</h3>
            <p class="cert-card__description">{{ cert.description }}</p>
            <div class="cert-card__tech" *ngIf="cert.techStack?.length">
              <span class="cert-card__tech-pill" *ngFor="let tech of cert.techStack">{{ tech }}</span>
            </div>
            <div class="cert-card__actions">
              <a [href]="cert.link" target="_blank" rel="noopener" class="cert-btn cert-btn-primary" appAnimatedBorder>
                View Certificate &rarr;
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
