<div class="page">
  <app-page-header label="Projects" title="What I've Built" subtitle="Platforms, tools, and experiments from production systems to side projects"></app-page-header>

  <section style="margin-bottom:var(--space-4xl)" *ngIf="content.flagship.length">
    <app-section-header label="Flagship Platforms"></app-section-header>

    <div class="gallery-horizontal" id="gallery-flagship">
      <div class="gallery-item" *ngFor="let project of content.flagship">
        <app-media-card [item]="project" tier="flagship"></app-media-card>
      </div>
    </div>
    <app-gallery-nav targetId="gallery-flagship"></app-gallery-nav>
  </section>

  <section style="margin-bottom:var(--space-4xl)">
    <app-section-header label="Automation &amp; AI Systems"></app-section-header>

    <a routerLink="/automation" class="automation-teaser reveal" appMagneticBtn>
      <div class="automation-teaser__body">
        <span class="automation-teaser__label">Automation &amp; AI Systems</span>
        <h2 class="automation-teaser__title">Engineering Delivery Pipeline</h2>
        <p class="automation-teaser__desc reveal-blur">
          From PRD to production — an AI-augmented workflow that turns requirements into deployed code.
          Explore the system tooling, default templates, and reusable CI/CD workflows queued up.
        </p>
        <span class="automation-teaser__cta">Explore Automation &rarr;</span>
      </div>
    </a>
  </section>

  <section style="margin-bottom:var(--space-4xl)" *ngIf="content.applied.length">
    <app-section-header label="Applied Engineering"></app-section-header>

    <div class="gallery-horizontal" id="gallery-applied">
      <div class="gallery-item" *ngFor="let project of content.applied">
        <app-media-card [item]="project"></app-media-card>
      </div>
    </div>
    <app-gallery-nav targetId="gallery-applied"></app-gallery-nav>
  </section>

  <section style="margin-bottom:var(--space-4xl)" *ngIf="content.archive.length">
    <app-section-header label="Archive / Early Projects"></app-section-header>

    <button class="archive-toggle" (click)="toggleArchive()" [attr.aria-expanded]="archiveOpen" appMagneticBtn>
      <span class="archive-toggle__left">
        <span class="archive-toggle__label">Early Projects</span>
        <span class="archive-toggle__count">{{ content.archive.length }} items</span>
      </span>
      <span class="archive-toggle__chevron">&#9660;</span>
    </button>

    <div class="archive-body" [class.archive-body--open]="archiveOpen">
      <div class="gallery-horizontal" id="gallery-archive" style="margin-top:var(--space-lg)">
        <div class="gallery-item" *ngFor="let project of content.archive">
          <app-media-card [item]="project"></app-media-card>
        </div>
      </div>
    </div>
  </section>
</div>
