<div class="page">
  <app-page-header label="Automation" title="Engineering Workflow &amp; AI Systems" subtitle="How I build: from PRD through visual contract to implementation"></app-page-header>

  <section class="flow-section">
    <app-section-header label="Development Pipeline"></app-section-header>

    <div class="flow-diagram reveal">
      <div class="flow-tracks">
        <div class="flow-track flow-track--boxes">
          <ng-container *ngFor="let node of content.automation.flow; let last = last">
            <div class="flow-node" [class.flow-node--active]="node.active">
              <div class="flow-node__box">{{ node.label }}</div>
            </div>
            <div class="flow-arrow" *ngIf="!last">
              <fa-icon [icon]="fa('chevron')" size="sm" class="flow-arrow__head"></fa-icon>
            </div>
          </ng-container>
        </div>
        <div class="flow-track flow-track--labels">
          <ng-container *ngFor="let node of content.automation.flow; let last = last">
            <div class="flow-label-cell">
              <span class="flow-node__label">{{ node.title }}</span>
              <span class="flow-node__status" *ngIf="node.status">{{ node.status }}</span>
            </div>
            <span class="flow-spacer" *ngIf="!last"></span>
          </ng-container>
        </div>
      </div>
    </div>
  </section>

  <section class="features-section">
    <app-section-header label="Engineering Systems"></app-section-header>

    <div class="feature-cards stagger-children reveal">
      <a *ngFor="let feature of content.automation.features"
         [href]="feature.repoUrl"
         target="_blank"
         rel="noopener"
         class="feature-card" appMagneticBtn>
        <div class="feature-card__icon"><fa-icon [icon]="fa(feature.icon)" size="lg"></fa-icon></div>
        <h2 class="feature-card__name">{{ feature.name }}</h2>
        <p class="feature-card__purpose reveal-blur">{{ feature.purpose }}</p>
        <div class="feature-card__tags">
          <app-pill-list [items]="feature.tags"></app-pill-list>
        </div>
        <span class="feature-card__link">&rarr; View on GitHub</span>
      </a>
    </div>
  </section>

  <div class="philosophy-strip reveal">
    <p class="philosophy-strip__text" appTypingEffect>{{ content.automation.philosophy }}</p>
  </div>
</div>
