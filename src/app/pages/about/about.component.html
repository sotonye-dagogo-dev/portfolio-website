<div class="page page-sm">
  <header class="page-header">
    <p class="page-header__label reveal">About</p>
    <h1 class="page-header__title reveal-left">Engineering Philosophy &amp; Background</h1>
  </header>

  <section class="bio-text reveal">
    <p class="reveal-blur" *ngFor="let para of content.about.bioParagraphs">{{ para }}</p>
  </section>

  <section class="principle-grid stagger-children reveal">
    <div class="principle-card" *ngFor="let principle of content.about.philosophy">
      <div class="principle-card__icon">{{ principle.icon }}</div>
      <h3 class="principle-card__title">{{ principle.title }}</h3>
      <p class="principle-card__desc reveal-blur">{{ principle.description }}</p>
    </div>
  </section>

  <section class="how-i-build">
    <p class="section-label" style="text-align:center;margin-bottom:var(--space-xl)">How I Build</p>
    <div class="how-i-build__list stagger-children reveal">
      <div class="how-i-build__item" *ngFor="let item of content.about.howIBuild">
        <div class="how-i-build__icon">{{ item.icon }}</div>
        <div class="how-i-build__body">
          <h3 class="how-i-build__title">{{ item.title }}</h3>
          <p class="how-i-build__desc reveal-blur">{{ item.description }}</p>
        </div>
      </div>
    </div>
  </section>

  <section class="contact-row reveal">
    <a *ngFor="let link of content.about.contactLinks" [href]="link.url" class="contact-link" target="_blank" rel="noopener" appMagneticBtn>
      {{ link.label }}
    </a>
  </section>

  <section class="currently-strip reveal" *ngIf="content.about.currently.length">
    <ng-container *ngFor="let item of content.about.currently; let last = last">
      <div class="currently-item">
        <span class="currently-dot" *ngIf="item.label === 'Availability'" appPulsatingEffect></span>
        <div>
          <p class="currently-label">{{ item.label }}</p>
          <p class="currently-value">{{ item.value }}</p>
        </div>
      </div>
      <div style="width:1px;height:32px;background:var(--border)" *ngIf="!last"></div>
    </ng-container>
  </section>
</div>
